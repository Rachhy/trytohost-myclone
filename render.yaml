services:
  # 1. The API Service (Node.js)
  - type: web
    name: camcyber-api
    runtime: node
    rootDir: api-v4  # Points to your API folder
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: camcyber-db
          property: connectionString

  # 2. The File Service
  - type: web
    name: camcyber-file
    runtime: node
    rootDir: file-v3 # Points to your File folder
    buildCommand: npm install
    startCommand: npm start

  # 3. The Web Frontend (Angular)
  - type: web
    name: camcyber-frontend
    runtime: node
    rootDir: web-v4  # Points to your Angular folder
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js # Or your specific production start command
    envVars:
      - key: API_BASE_URL
        fromStack:
          service: camcyber-api
          property: host

# 4. The PostgreSQL Database
databases:
  - name: camcyber-db
    plan: free